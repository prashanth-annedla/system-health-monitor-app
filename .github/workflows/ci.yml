name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build Docker image
              uses: docker/build-push-action@v7
              with:
                context: .
                push: false # push is false, assuming push can be donw once authenticated with registry in real-world scenario
                load: true
                tags: system-health-monitor-app:latest
    
    test:
        name: Test
        runs-on: ubuntu-latest
        needs: build
        env:
            DISABLE_OPENTELEMETRY: "1"
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: 3.12

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run tests
              run: |
                pytest -v tests/ --tb=short